server:
  port: 8080
  assets-path: /app/assets

theme:
  background-color: 222 14 14
  primary-color: 208 80 58
  positive-color: 142 68 50
  negative-color: 4 74 54
  contrast-multiplier: 1.1

pages:

  # ===========================================================================
  # Página 1: Início — visão geral do dia
  # ===========================================================================
  - name: Início
    columns:
      - size: small
        widgets:
          - type: clock
            hour-format: 24h
            timezones:
              - timezone: America/Recife
                label: Recife

          - type: weather
            location: Recife, Pernambuco, Brazil
            units: metric
            hour-format: 24h

          - type: search
            search-engine: duckduckgo
            target: _blank

          - type: monitor
            title: Serviços Online
            cache: 1m
            sites:
              - title: Nextcloud
                url: http://manager:8080
                icon: si:nextcloud
              - title: Vaultwarden
                url: http://manager:8081
                icon: si:bitwarden
              - title: Pi-hole
                url: http://manager:8082
                icon: si:pihole
              - title: Uptime Kuma
                url: http://manager:3002
                icon: si:uptimekuma
              - title: Gitea
                url: http://manager:3001
                icon: si:gitea
              - title: Jellyfin
                url: http://manager-1:8096
                icon: si:jellyfin
              - title: Open WebUI
                url: http://manager-1:3004
                icon: si:openai
              - title: Grafana
                url: http://manager-1:3003
                icon: si:grafana
              - title: n8n
                url: http://manager-1:5678
                icon: si:n8n

      - size: full
        widgets:
          - type: rss
            title: Tech News
            limit: 20
            collapse-after: 5
            feeds:
              - url: https://feeds.arstechnica.com/arstechnica/technology-lab
                title: Ars Technica
              - url: https://www.theverge.com/rss/index.xml
                title: The Verge
              - url: https://www.wired.com/feed/rss
                title: Wired
              - url: https://feeds.feedburner.com/TechCrunch
                title: TechCrunch

          - type: hacker-news

          - type: github-trending-repositories
            limit: 8
            languages:
              - python
              - go
              - typescript
              - rust

      - size: small
        widgets:
          - type: calendar

          - type: markets
            title: Mercados
            markets:
              - symbol: BTC-USD
                name: Bitcoin
              - symbol: ETH-USD
                name: Ethereum
              - symbol: USDBRL=X
                name: Dólar / Real
              - symbol: ^BVSP
                name: Ibovespa
              - symbol: ^GSPC
                name: S&P 500

          - type: bookmarks
            title: Acesso Rápido
            groups:
              - title: Notebook
                links:
                  - title: Nextcloud
                    url: http://manager:8080
                    icon: si:nextcloud
                  - title: Gitea
                    url: http://manager:3001
                    icon: si:gitea
                  - title: Vaultwarden
                    url: http://manager:8081
                    icon: si:bitwarden
                  - title: Pi-hole
                    url: http://manager:8082/admin
                    icon: si:pihole
                  - title: FreshRSS
                    url: http://manager:8083
                    icon: si:freshrss
                  - title: Uptime Kuma
                    url: http://manager:3002
                    icon: si:uptimekuma
              - title: Desktop
                links:
                  - title: Jellyfin
                    url: http://manager-1:8096
                    icon: si:jellyfin
                  - title: Sonarr
                    url: http://manager-1:8989
                    icon: si:sonarr
                  - title: Radarr
                    url: http://manager-1:7878
                    icon: si:radarr
                  - title: qBittorrent
                    url: http://manager-1:8090
                    icon: si:qbittorrent
                  - title: Prowlarr
                    url: http://manager-1:9696
                    icon: si:prowlarr
                  - title: n8n
                    url: http://manager-1:5678
                    icon: si:n8n
                  - title: Grafana
                    url: http://manager-1:3003
                    icon: si:grafana
              - title: IA
                links:
                  - title: Open WebUI
                    url: http://manager-1:3004
                    icon: si:openai
                  - title: SearXNG
                    url: http://manager-1:8888
                    icon: si:searxng

  # ===========================================================================
  # Página 2: Mídia — vídeos, streams e redes sociais
  # ===========================================================================
  - name: Mídia
    columns:
      - size: small
        widgets:
          - type: twitch-top-games
            limit: 10
            exclude:
              - just-chatting

          - type: reddit
            title: r/homelab
            subreddit: homelab
            show-thumbnails: true
            limit: 8
            collapse-after: 5

      - size: full
        widgets:
          - type: videos
            title: YouTube — Tech & Homelab
            style: grid-cards
            collapse-after-rows: 3
            channels:
              - UCXuqSBlHAE6Xw-yeJA0Tunw  # Linus Tech Tips
              - UCR-DXc1voovS8nhAvccRZhg  # Jeff Geerling
              - UC9x0AN7BWHpCDHSm9NiJFJQ  # NetworkChuck
              - UCVls1GmFKf6WlTraIb_IaJg  # Craft Computing
              - UCOk-gHyjcWZNj3Br3flm1hA  # Techno Tim

      - size: small
        widgets:
          - type: reddit
            title: r/selfhosted
            subreddit: selfhosted
            show-thumbnails: true
            limit: 8
            collapse-after: 5

          - type: reddit
            title: r/linux
            subreddit: linux
            show-thumbnails: false
            limit: 8
            collapse-after: 5

  # ===========================================================================
  # Página 3: Dev — GitHub, releases e feeds técnicos
  # ===========================================================================
  - name: Dev
    columns:
      - size: small
        widgets:
          - type: releases
            title: Atualizações dos Serviços
            repositories:
              - jellyfin/jellyfin
              - ollama/ollama
              - pi-hole/pi-hole
              - louislam/uptime-kuma
              - nextcloud/server
              - go-gitea/gitea
              - dani-garcia/vaultwarden
              - glanceapp/glance
              - ajnart/homarr

          - type: repository
            repository: glanceapp/glance

      - size: full
        widgets:
          - type: github-trending-repositories
            title: Em Alta no GitHub — Semana
            since: weekly
            limit: 12
            languages:
              - python
              - go
              - rust
              - typescript
              - shell

          - type: rss
            title: Linux & Self-Hosting
            limit: 15
            collapse-after: 5
            feeds:
              - url: https://selfhosted.show/rss
                title: Self-Hosted Show
              - url: https://linuxunplugged.com/rss
                title: Linux Unplugged
              - url: https://www.phoronix.com/rss.php
                title: Phoronix
              - url: https://itsfoss.com/feed
                title: It's FOSS

      - size: small
        widgets:
          - type: repository
            repository: jellyfin/jellyfin

          - type: repository
            repository: ollama/ollama
