# =============================================================================
# Homepage — Configuração de Serviços
# =============================================================================

# -----------------------------------------------------------------------------
# Grupo 1: Infraestrutura sempre ligada no Notebook
# -----------------------------------------------------------------------------
- Sempre Ligado:
    - Nextcloud:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8080"
        description: Armazenamento em nuvem pessoal
        icon: nextcloud.png
        widget:
          type: nextcloud
          url: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8080"
          username: "{{HOMEPAGE_VAR_NEXTCLOUD_USER}}"
          password: "{{HOMEPAGE_VAR_NEXTCLOUD_PASS}}"

    - Vaultwarden:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8081"
        description: Gerenciador de senhas
        icon: bitwarden.png

    - Pi-hole:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8082/admin"
        description: Bloqueio de anúncios via DNS
        icon: pi-hole.png
        widget:
          type: pihole
          version: 6
          url: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8082"
          key: "{{HOMEPAGE_VAR_PIHOLE_KEY}}"

    - Uptime Kuma:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:3002"
        description: Monitor de disponibilidade
        icon: uptime-kuma.png
        widget:
          type: uptimekuma
          url: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:3002"
          slug: homelab

    - Gitea:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:3001"
        description: Servidor Git self-hosted
        icon: gitea.png

    - FreshRSS:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8083"
        description: Leitor de feeds RSS
        icon: freshrss.png

# -----------------------------------------------------------------------------
# Grupo 2: Mídia e downloads — Desktop sob demanda
# -----------------------------------------------------------------------------
- Mídia & Downloads:
    - Jellyfin:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8096"
        description: Servidor de filmes e séries
        icon: jellyfin.png
        widget:
          type: jellyfin
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8096"
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          enableBlocks: true
          enableNowPlaying: true

    - Sonarr:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8989"
        description: Automação de séries
        icon: sonarr.png
        widget:
          type: sonarr
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8989"
          key: "{{HOMEPAGE_VAR_SONARR_KEY}}"

    - Radarr:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:7878"
        description: Automação de filmes
        icon: radarr.png
        widget:
          type: radarr
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:7878"
          key: "{{HOMEPAGE_VAR_RADARR_KEY}}"

    - qBittorrent:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8090"
        description: Cliente BitTorrent
        icon: qbittorrent.png
        widget:
          type: qbittorrent
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8090"
          username: admin
          password: "{{HOMEPAGE_VAR_QBIT_PASS}}"

    - Prowlarr:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:9696"
        description: Gerenciador de indexadores
        icon: prowlarr.png

    - Bazarr:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:6767"
        description: Gerenciador de legendas
        icon: bazarr.png

# -----------------------------------------------------------------------------
# Grupo 3: IA e automação
# -----------------------------------------------------------------------------
- IA & Automação:
    - Open WebUI:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:3004"
        description: Chat com IA local
        icon: ollama.png

    - Ollama:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:11434"
        description: Motor de LLM (AMD Vulkan)
        icon: ollama.png
        widget:
          type: customapi
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:5000/status"
          refreshInterval: 30000
          method: GET
          mappings:
            - field: running
              label: GPU Stack

    - n8n:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:5678"
        description: Automação de fluxos
        icon: n8n.png

    - Grafana:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:3003"
        description: Dashboards de métricas
        icon: grafana.png
        widget:
          type: grafana
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:3003"
          username: admin
          password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"

# -----------------------------------------------------------------------------
# Grupo 4: Controles — ligar e desligar Desktop e GPU Stack
# -----------------------------------------------------------------------------
- Controles:
    - Ligar Desktop:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:5001/wol/start"
        description: Wake on LAN
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/proxmox.png
        widget:
          type: customapi
          url: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:5001/wol/status"
          refreshInterval: 15000
          method: GET
          mappings:
            - field: online
              label: Desktop

    - Ligar GPU:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:5000/gpu/start"
        description: Inicia Ollama + Open WebUI
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/ollama.png

    - Desligar GPU:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:5000/gpu/stop"
        description: Para Ollama + Open WebUI
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/docker.png

    - Desligar Desktop:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:5000/desktop/stop"
        description: Desliga o Desktop
        icon: https://cdn.jsdelivr.net/gh/walkxcode/dashboard-icons/png/portainer.png
