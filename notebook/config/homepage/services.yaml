# =============================================================================
# Homepage — Configuração de Serviços
# Organizado em três grupos: Notebook 24/7, Desktop Sob Demanda, GPU Stack
# Variáveis de ambiente são resolvidas pelo Homepage no runtime
# Docs: https://gethomepage.dev/latest/configs/services/
# =============================================================================

# -----------------------------------------------------------------------------
# Grupo 1: Serviços do Notebook — disponíveis 24 horas por dia
# -----------------------------------------------------------------------------
- Notebook — 24/7:
    - Nextcloud:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8080"
        description: Armazenamento pessoal em nuvem
        icon: nextcloud.png
        widget:
          type: nextcloud
          url: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8080"
          username: "{{HOMEPAGE_VAR_NEXTCLOUD_USER}}"
          password: "{{HOMEPAGE_VAR_NEXTCLOUD_PASS}}"

    - Gitea:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:3001"
        description: Servidor Git self-hosted
        icon: gitea.png
        widget:
          type: gitea
          url: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:3001"
          # Gere um token em: Gitea > Configurações > Aplicativos
          key: "{{HOMEPAGE_VAR_GITEA_KEY}}"

    - Vaultwarden:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8081"
        description: Gerenciador de senhas (compatível Bitwarden)
        icon: bitwarden.png

    - Pi-hole:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8082/admin"
        description: Bloqueio de anúncios via DNS
        icon: pi-hole.png
        widget:
          type: pihole
          url: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8082"
          # Gere uma API key em: Pi-hole > Settings > API / Web interface
          key: "{{HOMEPAGE_VAR_PIHOLE_KEY}}"

    - Uptime Kuma:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:3002"
        description: Monitor de disponibilidade dos serviços
        icon: uptime-kuma.png
        widget:
          type: uptimekuma
          url: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:3002"
          slug: homelab

    - FreshRSS:
        href: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8083"
        description: Agregador de feeds RSS
        icon: freshrss.png
        widget:
          type: freshrss
          url: "http://{{HOMEPAGE_VAR_NOTEBOOK_IP}}:8083"
          username: "{{HOMEPAGE_VAR_FRESHRSS_USER}}"
          password: "{{HOMEPAGE_VAR_FRESHRSS_PASS}}"

# -----------------------------------------------------------------------------
# Grupo 2: Serviços do Desktop — ligado sob demanda via Wake on LAN
# -----------------------------------------------------------------------------
- Desktop — Sob Demanda:
    - Jellyfin:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8096"
        description: Servidor de mídia (filmes e séries)
        icon: jellyfin.png
        widget:
          type: jellyfin
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8096"
          # Gere uma API key em: Jellyfin > Painel > API Keys
          key: "{{HOMEPAGE_VAR_JELLYFIN_KEY}}"
          enableBlocks: true
          enableNowPlaying: true

    - Sonarr:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8989"
        description: Automação de download de séries
        icon: sonarr.png
        widget:
          type: sonarr
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8989"
          # Encontre a API key em: Sonarr > Settings > General
          key: "{{HOMEPAGE_VAR_SONARR_KEY}}"

    - Radarr:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:7878"
        description: Automação de download de filmes
        icon: radarr.png
        widget:
          type: radarr
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:7878"
          # Encontre a API key em: Radarr > Settings > General
          key: "{{HOMEPAGE_VAR_RADARR_KEY}}"

    - qBittorrent:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8090"
        description: Cliente BitTorrent
        icon: qbittorrent.png
        widget:
          type: qbittorrent
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:8090"
          username: admin
          password: "{{HOMEPAGE_VAR_QBIT_PASS}}"

    - Grafana:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:3003"
        description: Dashboards de métricas do sistema
        icon: grafana.png
        widget:
          type: grafana
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:3003"
          username: admin
          password: "{{HOMEPAGE_VAR_GRAFANA_PASS}}"

    - n8n:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:5678"
        description: Automação de fluxos e integrações
        icon: n8n.png

# -----------------------------------------------------------------------------
# Grupo 3: GPU Stack — Ollama e Open WebUI para IA local
# -----------------------------------------------------------------------------
- GPU Stack:
    - Ollama:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:11434"
        description: Motor de LLM local com suporte AMD ROCm
        icon: ollama.png

    - Open WebUI:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:3004"
        description: Interface web para o Ollama
        icon: ollama.png

    - Webhook GPU:
        href: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:5000"
        description: Ligar / Desligar GPU Stack
        icon: docker.png
        widget:
          type: customapi
          url: "http://{{HOMEPAGE_VAR_DESKTOP_IP}}:5000/health"
          refreshInterval: 30000
          method: GET
          mappings:
            - field: status
              label: Status
              format: text
