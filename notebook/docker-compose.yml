version: "3.8"

# =============================================================================
# Notebook — Serviços 24/7
# Todos os serviços sobem automaticamente com o Docker (restart: unless-stopped)
# Execute: docker compose up -d
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Homepage — Dashboard centralizado com links para todos os serviços
  # Acesso: http://<ip>:3000
  # ---------------------------------------------------------------------------
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Configurações do dashboard (services.yaml, widgets.yaml, settings.yaml)
      - ./config/homepage:/app/config
      # Acesso ao Docker socket para exibir status dos containers no dashboard
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Imagens usadas no dashboard (ícones, background, etc.)
      - ./config/homepage/images:/app/public/images
    extra_hosts:
      # Permite que o container resolva os hostnames da rede local
      - "manager:host-gateway"
      - "manager-1:192.168.68.111"
    environment:
      # IPs usados nos widgets do homepage — ajuste conforme sua rede
      HOMEPAGE_VAR_NOTEBOOK_IP: ${NOTEBOOK_IP:-localhost}
      HOMEPAGE_VAR_DESKTOP_IP: ${DESKTOP_IP:-192.168.1.X}
      HOMEPAGE_VAR_JELLYFIN_KEY: ${JELLYFIN_KEY:-}
      HOMEPAGE_VAR_SONARR_KEY: ${SONARR_KEY:-}
      HOMEPAGE_VAR_RADARR_KEY: ${RADARR_KEY:-}
      HOMEPAGE_VAR_NEXTCLOUD_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      HOMEPAGE_VAR_NEXTCLOUD_PASS: ${NEXTCLOUD_ADMIN_PASSWORD:-}
      HOMEPAGE_VAR_PIHOLE_KEY: ${PIHOLE_KEY:-}
      HOMEPAGE_VAR_UPTIME_KEY: ${UPTIME_KEY:-}
      HOMEPAGE_VAR_GRAFANA_USER: ${HOMEPAGE_VAR_GRAFANA_USER:-admin}
      HOMEPAGE_VAR_GRAFANA_PASS: ${HOMEPAGE_VAR_GRAFANA_PASS:-}
      HOMEPAGE_VAR_GRAFANA_TOKEN: ${HOMEPAGE_VAR_GRAFANA_TOKEN:-}
      HOMEPAGE_ALLOWED_HOSTS: ${NOTEBOOK_IP:-192.168.68.105}:3000,100.65.108.30:3000

  # ---------------------------------------------------------------------------
  # Glance — Dashboard minimalista com widgets de RSS, clima, GitHub, mercados
  # Acesso: http://<ip>:8084
  # ---------------------------------------------------------------------------
  glance:
    image: glanceapp/glance:latest
    container_name: glance
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8084:8080"
    volumes:
      - ./config/glance/glance.yml:/app/config/glance.yml:ro
    extra_hosts:
      - "manager:host-gateway"
      - "manager-1:192.168.68.111"



  # ---------------------------------------------------------------------------
  # Nextcloud — Armazenamento pessoal em nuvem
  # Acesso: http://<ip>:8080
  # Credenciais definidas nas variáveis NEXTCLOUD_ADMIN_USER/PASSWORD
  # ---------------------------------------------------------------------------
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      # Dados do Nextcloud (arquivos, banco SQLite, apps)
      - nextcloud_data:/var/www/html
      # Ponto de montagem para dados externos (HD externo, NFS, etc.)
      - /mnt/desktop:/mnt/desktop
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}

  # ---------------------------------------------------------------------------
  # Gitea — Servidor Git self-hosted, alternativa leve ao GitHub/GitLab
  # Acesso web: http://<ip>:3001
  # SSH para repositórios: ssh://git@<ip>:222
  # ---------------------------------------------------------------------------
  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    ports:
      - "3001:3000"
      - "222:22"
    volumes:
      - gitea_data:/data

  # ---------------------------------------------------------------------------
  # Vaultwarden — Gerenciador de senhas compatível com Bitwarden
  # Acesso: http://<ip>:8081
  # Configure o admin token em ADMIN_TOKEN se quiser painel administrativo
  # ---------------------------------------------------------------------------
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "8081:80"
    volumes:
      - vaultwarden_data:/data
    environment:
      DOMAIN: ${VAULTWARDEN_DOMAIN:-https://localhost:8081}
      WEBSOCKET_ENABLED: "true"
      ADMIN_TOKEN: ${VAULTWARDEN_ADMIN_TOKEN}

  # ---------------------------------------------------------------------------
  # Pi-hole — Bloqueio de anúncios em nível de rede via DNS
  # Interface web: http://<ip>:8082/admin
  # DNS: aponte os dispositivos da rede para o IP do Notebook na porta 53
  # ---------------------------------------------------------------------------
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    network_mode: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      WEBPASSWORD: ${PIHOLE_PASSWORD}
      TZ: America/Recife
      FTLCONF_webserver_port: "8082o,[::]:8082o"
    volumes:
      - pihole_data:/etc/pihole
    cap_add:
      - NET_ADMIN

  # ---------------------------------------------------------------------------
  # Uptime Kuma — Monitor de disponibilidade para todos os serviços
  # Acesso: http://<ip>:3002
  # Configure os monitores pela interface web na primeira execução
  # ---------------------------------------------------------------------------
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    restart: unless-stopped
    ports:
      - "3002:3001"
    volumes:
      - uptime_data:/app/data

  # ---------------------------------------------------------------------------
  # FreshRSS — Agregador de feeds RSS self-hosted
  # Acesso: http://<ip>:8083
  # ---------------------------------------------------------------------------
  freshrss:
    image: freshrss/freshrss:latest
    container_name: freshrss
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - freshrss_data:/var/www/FreshRSS/data
    environment:
      TZ: America/Recife

  # ---------------------------------------------------------------------------
  # Nginx Proxy Manager — Reverse proxy com interface web e SSL automático
  # Painel: http://<ip>:81  |  Login padrão: admin@example.com / changeme
  # HTTP: 80, HTTPS: 443, Painel: 81
  # ---------------------------------------------------------------------------
  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
      - ~/homelab/notebook/certs:/certs:ro

  # ---------------------------------------------------------------------------
  # WoL — Endpoint HTTP para ligar o Desktop via Wake on LAN
  # Acesso: http://<ip>:5001/wol/start  |  /wol/status  |  /health
  # ---------------------------------------------------------------------------
  wol:
    build: ./wol
    container_name: wol
    restart: unless-stopped
    network_mode: host
    environment:
      DESKTOP_MAC: ${DESKTOP_MAC}
      DESKTOP_IP: ${DESKTOP_IP}

  # ---------------------------------------------------------------------------
  # Tailscale — VPN mesh para acesso seguro de qualquer lugar
  # Após subir: docker exec tailscale tailscale up --authkey=$TS_AUTHKEY
  # ---------------------------------------------------------------------------
  duplicati:
    image: linuxserver/duplicati:latest
    container_name: duplicati
    restart: unless-stopped
    ports:
      - "8200:8200"
    volumes:
      - duplicati_config:/config
      - /mnt/desktop:/mnt/desktop:ro
      - nextcloud_data:/source/nextcloud:ro
      - gitea_data:/source/gitea:ro
      - vaultwarden_data:/source/vaultwarden:ro
      - ~/homelab:/source/homelab:ro
    environment:
      PUID: 1000
      PGID: 1000
      TZ: America/Recife
      SETTINGS_ENCRYPTION_KEY: ${DUPLICATI_ENCRYPTION_KEY}
      DUPLICATI__WEBSERVICE_PASSWORD: ${DUPLICATI_PASSWORD}

  tailscale:
    image: tailscale/tailscale:latest
    container_name: tailscale
    restart: unless-stopped
    network_mode: host
    volumes:
      - tailscale_data:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY}
      TS_STATE_DIR: /var/lib/tailscale

  # ---------------------------------------------------------------------------                                                                                                                         
  # Open Health — App de controle nutricional self-hosted                                                                                                                                               
  # Frontend: http://<ip>:3003                                                                                                                                                                          
  # API:      http://<ip>:3004                                                                                                                                                                          
  # ---------------------------------------------------------------------------                                                                                                                         
  open-health-api:                                                                                                                                                                                      
    image: ghcr.io/jonatasalves9/open-health-api:latest                                                                                                                                                 
    container_name: open-health-api                                                                                                                                                                     
    restart: unless-stopped                                                                                                                                                                             
    ports:
      - "3004:3001"                          # ← faltava isso                                                                                                                                           
    volumes:                                
      - open_health_data:/data                                                                                                                                                                          
    environment:                                          
      NODE_ENV: production                                                                                                                                                                              
      DATABASE_URL: /data/open-health.db
      FRONTEND_URL: http://${NOTEBOOK_IP}:3003   # ← origin exato do browser                                                                                                                            
                                                          
  open-health-frontend:                 
    image: ghcr.io/jonatasalves9/open-health-frontend:latest
    container_name: open-health-frontend                                                                                                                                                                
    restart: unless-stopped             
    ports:                                                                                                                                                                                              
      - "3003:3000"                                                                                                                                                                                     
    environment:
      NODE_ENV: production                                                                                                                                                                              
      API_URL: http://open-health-api:3001
      NEXT_PUBLIC_API_URL: http://${NOTEBOOK_IP}:3004
    depends_on:                             
      - open-health-api                 


  # ---------------------------------------------------------------------------
  # Firefly III — Gerenciador de finanças pessoais
  # Acesso: http://<ip>:8085
  # ---------------------------------------------------------------------------
  firefly:
    image: fireflyiii/core:latest
    container_name: firefly
    restart: unless-stopped
    ports:
      - "8085:8080"
    volumes:
      - firefly_upload:/var/www/html/storage/upload
    environment:
      APP_KEY: ${FIREFLY_APP_KEY}
      DB_CONNECTION: pgsql
      DB_HOST: firefly-db
      DB_PORT: 5432
      DB_DATABASE: firefly
      DB_USERNAME: firefly
      DB_PASSWORD: ${FIREFLY_DB_PASSWORD}
      APP_URL: http://${NOTEBOOK_IP}:8085
      TRUSTED_PROXIES: "**"
    depends_on:
      - firefly-db

  firefly-db:
    image: postgres:16-alpine
    container_name: firefly-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: firefly
      POSTGRES_USER: firefly
      POSTGRES_PASSWORD: ${FIREFLY_DB_PASSWORD}
    volumes:
      - firefly_db:/var/lib/postgresql/data

# =============================================================================
# Volumes nomeados — dados persistentes gerenciados pelo Docker
# Para inspecionar: docker volume inspect <nome>
# =============================================================================
volumes:
  nextcloud_data:
  gitea_data:
  vaultwarden_data:
  pihole_data:
  uptime_data:
  freshrss_data:
  duplicati_config:
  tailscale_data:
  npm_data:
  npm_letsencrypt:
  open_health_data:

